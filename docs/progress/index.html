<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worklog · KSA Landmarks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
<style>

:root {
  /* Light theme — cool gray palette (iOS doc tone) */
  --bg: #f4f6f9;
  --bg-elev: #ffffff;
  --bg-sunken: #eef1f5;
  --border: #e3e7ed;
  --border-strong: #c8cfd9;
  --ink: #0e131b;
  --ink-soft: #44505f;
  --ink-mute: #8a94a3;
  --accent: #4a6585;
  --accent-soft: #dde5f0;
  /* Tier — 한색 계열, 구분 강화 (deep blue / saturated teal / neutral slate) */
  --tier-1: #2c5588;
  --tier-2: #3a8a78;
  --tier-3: #8696a8;
  /* Alert — cool muted plum (한색 계열 경고) */
  --alert: #8a6878;
  --mono: 'SF Mono', 'JetBrains Mono', ui-monospace, Menlo, monospace;
  --shadow-sm: 0 1px 0 rgba(15, 25, 40, 0.04);
  --shadow-md: 0 4px 16px rgba(15, 25, 40, 0.06);
  --sidebar-width: 280px;
  --topbar-height: 64px;
}

[data-theme="dark"] {
  --bg: #0c1018;
  --bg-elev: #181c24;
  --bg-sunken: #12161e;
  --border: #2a3140;
  --border-strong: #3a4250;
  --ink: #ecf0f7;
  --ink-soft: #b4bcca;
  --ink-mute: #6e7787;
  --accent: #8aa5cc;
  --accent-soft: #1f2530;
  /* Tier — dark: 밝기 보정 + hue 강조 유지 */
  --tier-1: #7ea4d5;
  --tier-2: #6db8a4;
  --tier-3: #a5b3c5;
  --alert: #c39aac;
  --shadow-sm: 0 1px 0 rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.5);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

/* ───── TOP BAR ───── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-height);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 18px;
  z-index: 100;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  background: color-mix(in srgb, var(--bg-elev) 92%, transparent);
  user-select: none;
}

.brand {
  display: flex;
  flex-direction: column;
  justify-content: center;
  line-height: 1;
}
.brand-mark { font-weight: 700; font-size: 17px; letter-spacing: -0.02em; color: var(--ink); line-height: 1.1; }
.brand-meta {
  font-family: var(--mono);
  font-size: 9.5px; color: var(--ink-mute);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-top: 3px; line-height: 1;
}

.topbar-nav {
  display: flex;
  gap: 4px;
  margin-left: 12px;
}
.topbar-nav a {
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-soft);
  background: var(--bg-sunken);
  transition: background 0.14s ease, color 0.14s ease;
}
.topbar-nav a:hover { color: var(--ink); }
.topbar-nav a.active { background: var(--ink); color: var(--bg-elev); }

.topbar-spacer { flex: 1; }

.icon-btn {
  width: 36px; height: 36px;
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-soft);
  background: var(--bg-elev);
  transition: background 0.14s ease, color 0.14s ease;
}
.icon-btn:hover { background: var(--bg-sunken); color: var(--ink); }
[data-theme="dark"] .sun-icon { display: none; }
[data-theme="light"] .moon-icon { display: none; }
.moon-icon { transform: translate(1px, -1px); }

/* ───── MAIN ───── */
.main {
  max-width: 920px;
  margin: 0 auto;
  padding: calc(var(--topbar-height) + 40px) 32px 100px;
}

.page-head { margin-bottom: 44px; }
.page-eyebrow {
  font-family: var(--mono);
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}
.page-title {
  font-size: clamp(30px, 4vw, 42px);
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.05;
  color: var(--ink);
}
.page-sub {
  margin-top: 14px;
  font-size: 15px;
  color: var(--ink-soft);
  max-width: 60ch;
}
.page-count {
  margin-top: 18px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-mute);
}

/* ───── TIMELINE ───── */
.timeline { position: relative; }

.entry {
  position: relative;
  padding: 0 0 40px 32px;
  border-left: 2px solid var(--border);
}
.entry:last-child { border-left-color: transparent; padding-bottom: 0; }

.entry::before {
  content: '';
  position: absolute;
  left: -7px; top: 4px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--accent);
  border: 3px solid var(--bg);
}

.entry-date {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-mute);
  letter-spacing: 0.02em;
  margin-bottom: 10px;
}

.entry-card {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.entry-head {
  padding: 18px 22px 0;
}

.entry-landmark {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.entry-num {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-mute);
}
.entry-landmark-name {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-soft);
}
.entry-tier {
  width: 8px; height: 8px; border-radius: 50%;
}

.entry-sample-badge {
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--alert);
  background: color-mix(in srgb, var(--alert) 12%, var(--bg-elev));
  border: 1px solid color-mix(in srgb, var(--alert) 30%, var(--border));
  padding: 2px 7px;
  border-radius: 999px;
  margin-left: 2px;
}

.entry-title {
  font-size: 19px;
  font-weight: 700;
  letter-spacing: -0.015em;
  color: var(--ink);
  margin-bottom: 8px;
}

.entry-notes {
  font-size: 13.5px;
  color: var(--ink-soft);
  line-height: 1.6;
  margin-bottom: 16px;
}

/* ───── 3D 모델 (버튼 → 공유 모달) ───── */
.entry-models {
  padding: 4px 22px 4px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.model-btns { display: flex; flex-wrap: wrap; gap: 8px; }
.model-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  border-radius: 10px;
  background: var(--accent);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  transition: opacity 0.14s ease, transform 0.14s ease;
}
.model-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.model-btn svg { flex-shrink: 0; }

/* ───── SCREENSHOTS ───── */
.entry-shots {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
  padding: 16px 22px 20px;
}
.entry-shot {
  position: relative;
  aspect-ratio: 4 / 3;
  border-radius: 10px;
  overflow: hidden;
  cursor: zoom-in;
  border: 1px solid var(--border);
  background: var(--bg-sunken);
}
.entry-shot img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}
.entry-shot:hover img { transform: scale(1.04); }
.shot-dl {
  position: absolute;
  top: 8px; right: 8px;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 7px;
  background: color-mix(in srgb, var(--bg-elev) 88%, transparent);
  backdrop-filter: blur(6px);
  border: 1px solid var(--border);
  color: var(--ink-soft);
  opacity: 0;
  transition: opacity 0.14s ease, background 0.14s ease, color 0.14s ease;
}
.entry-shot:hover .shot-dl { opacity: 1; }
.shot-dl:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

.entry-foot { padding: 16px 22px 18px; border-top: 1px solid var(--border); }
.entry-ref-link {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
}

/* 빈 상태 */
.empty {
  padding: 80px 20px;
  text-align: center;
  color: var(--ink-mute);
}
.empty-title { font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 8px; }

/* lightbox */
.lightbox {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.88);
  display: none; align-items: center; justify-content: center;
  cursor: zoom-out; padding: 40px;
  backdrop-filter: blur(4px);
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 100%; max-height: calc(100vh - 80px);
  object-fit: contain; border-radius: 4px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

@media (max-width: 640px) {
  .main { padding: calc(var(--topbar-height) + 28px) 18px 60px; }
  .entry { padding-left: 24px; }
}

</style>
</head>
<body data-theme="light">

<header class="topbar">

<div class="model-modal" id="model-modal" aria-hidden="true">

<style>
.model-modal {
  position: fixed; inset: 0; z-index: 250;
  display: none; align-items: center; justify-content: center;
  background: rgba(8, 12, 20, 0.78);
  backdrop-filter: blur(6px);
  padding: 40px;
}
.model-modal.open { display: flex; }
.model-modal-panel {
  position: relative;
  width: min(880px, 100%);
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 24px 70px rgba(0,0,0,0.4);
}
.model-modal-close {
  position: absolute; top: 12px; right: 12px; z-index: 10;
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: color-mix(in srgb, var(--bg-elev) 80%, transparent);
  backdrop-filter: blur(6px);
  border: 1px solid var(--border);
  color: var(--ink-soft); font-size: 20px; line-height: 1;
}
.model-modal-close:hover { color: var(--ink); background: var(--bg-sunken); }
.model-modal-stage {
  width: 100%; height: min(64vh, 540px);
  background: radial-gradient(circle at 50% 38%, #5b6573 0%, #3a414d 55%, #272c34 100%);
}
.model-modal-stage model-viewer { width: 100%; height: 100%; --poster-color: transparent; }
.model-modal-foot {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.model-modal-tabs { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; min-width: 0; }
.model-modal-tab {
  padding: 6px 12px; border-radius: 8px;
  background: var(--bg-sunken); border: 1px solid var(--border);
  font-size: 12.5px; font-weight: 500; color: var(--ink-soft);
  display: inline-flex; align-items: baseline; gap: 6px;
}
.model-modal-tab:hover { color: var(--ink); }
.model-modal-tab.active { border-color: var(--accent); color: var(--ink); }
.model-tri {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-mute);
  padding: 6px 10px;
  border-radius: 8px;
  background: var(--bg-sunken);
  flex-shrink: 0;
  white-space: nowrap;
}
.model-wire-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 8px;
  background: var(--bg-sunken); border: 1px solid var(--border);
  font-size: 11.5px; font-weight: 500; color: var(--ink-soft);
  flex-shrink: 0;
  transition: background 0.14s ease, color 0.14s ease, border-color 0.14s ease;
}
.model-wire-toggle:hover { color: var(--ink); }
.model-wire-toggle[aria-pressed="true"] {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.model-wire-toggle svg { flex-shrink: 0; }
.model-modal .model-dl {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px;
  background: var(--ink); color: var(--bg-elev);
  font-family: var(--mono); font-size: 11px;
  flex-shrink: 0;
}
.model-modal .model-dl:hover { opacity: 0.88; }
@media (max-width: 640px) {

}
</style>
<script>
(function(){
  const ASSET_BASE = 'assets/';
  const modal = document.getElementById('model-modal');
  if (!modal) return;
  const mv = document.getElementById('modal-mv');
  const tabsEl = document.getElementById('modal-tabs');
  const dl = document.getElementById('modal-dl');
  const dlLabel = document.getElementById('modal-dl-label');
  const wireBtn = document.getElementById('modal-wire');
  const triEl = document.getElementById('modal-tri');
  let wireOn = false;

  // model-viewer 내부 Three.js scene 접근 (와이어프레임 + tri 카운트용)
  function getScene(){
    const sym = Object.getOwnPropertySymbols(mv).find(s => s.description === 'scene');
    return sym ? mv[sym] : null;
  }
  function applyWire(){
    const scene = getScene();
    if (!scene) return;
    scene.traverse(o => { if (o.isMesh && o.material) {
      (Array.isArray(o.material) ? o.material : [o.material]).forEach(mat => mat.wireframe = wireOn);
    }});
    if (typeof scene.queueRender === 'function') scene.queueRender();
  }
  function updateTri(){
    const scene = getScene();
    if (!scene) { triEl.hidden = true; return; }
    let tris = 0, found = false;
    scene.traverse(o => {
      if (o.isMesh && o.geometry && o.visible !== false) {
        const g = o.geometry, pos = g.attributes && g.attributes.position;
        if (g.index) { tris += g.index.count/3; found = true; }
        else if (pos) { tris += pos.count/3; found = true; }
      }
    });
    if (!found) { triEl.hidden = true; return; }
    triEl.hidden = false;
    triEl.textContent = '△ ' + Math.round(tris).toLocaleString() + ' tris';
  }
  // 모델 로드 완료 때마다: 와이어 상태 반영 + tri 카운트 갱신
  mv.addEventListener('load', () => { applyWire(); updateTri(); });

  function load(models, idx){
    const m = models[idx];
    const src = ASSET_BASE + m.file;
    mv.setAttribute('src', src);
    dl.setAttribute('href', src);
    const name = m.file.split('/').pop();
    dlLabel.textContent = name + ' (' + (m.mb!=null? m.mb.toFixed(1):'0.0') + ' MB)';
    tabsEl.querySelectorAll('.model-modal-tab').forEach((t,i)=> t.classList.toggle('active', i===idx));
  }

  wireBtn.addEventListener('click', () => {
    wireOn = !wireOn;
    wireBtn.setAttribute('aria-pressed', wireOn ? 'true' : 'false');
    applyWire();
  });

  window.openModelModal = function(models, startIdx){
    if (!models || !models.length) return;
    triEl.hidden = true;
    tabsEl.innerHTML = '';
    // 모델 1개면 탭 숨김
    if (models.length > 1) {
      models.forEach((m, i) => {
        const b = document.createElement('button');
        b.className = 'model-modal-tab';
        b.innerHTML = (m.label || m.file);
        b.addEventListener('click', () => load(models, i));
        tabsEl.appendChild(b);
      });
    }
    load(models, startIdx || 0);
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  function close(){ modal.classList.remove('open'); mv.removeAttribute('src'); document.body.style.overflow=''; }
  document.getElementById('model-modal-close').addEventListener('click', close);
  modal.addEventListener('click', e => { if (e.target === modal) close(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('open')) close(); });

  // 모든 .model-btn 트리거 연결
  document.querySelectorAll('.model-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      try {
        const models = JSON.parse(btn.getAttribute('data-models'));
        window.openModelModal(models, parseInt(btn.getAttribute('data-start')||'0', 10));
      } catch(err) {}
    });
  });
})();
</script>


<script>
(function(){
  // theme (메인과 같은 localStorage 키 공유)
  const stored = localStorage.getItem('ksa-theme');
  if (stored === 'dark') document.body.setAttribute('data-theme', 'dark');
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('ksa-theme', isDark ? 'light' : 'dark');
  });

  // 3D 모델은 공유 모달이 처리 (.model-btn → window.openModelModal)

  // lightbox (다운로드 버튼 클릭은 제외)
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');
  document.querySelectorAll('.entry-shot img').forEach(img => {
    img.addEventListener('click', () => {
      lbImg.src = img.src;
      lb.classList.add('open');
    });
  });
  document.querySelectorAll('.shot-dl').forEach(a => {
    a.addEventListener('click', e => e.stopPropagation());
  });
  lb.addEventListener('click', () => { lb.classList.remove('open'); lbImg.src = ''; });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { lb.classList.remove('open'); lbImg.src = ''; }
  });
})();
</script>
